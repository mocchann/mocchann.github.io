<!DOCTYPE html>
<html lang="ja">
<head>

<body>

          </ul>
        </div>

    </div>
  </div>
  <main>
    <div class="container mx-auto mt-16 md:mt-0">
      <p>コンテンツ領域</p>
    </div>
  </main>
  <footer>
    
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script>
    const app = new Vue({
      el : '#app',
      data: {
        isOpen: false,
      }
    })
  </script>

</html>
